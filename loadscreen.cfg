# ── NiteLife Loadscreen Config ───────────────────────────────────────────────
# Settings here are overridden by server.cfg's loadscreen block.
# This file is kept as a reference and fallback only.
# To switch options, uncomment the desired line and comment out the active one.

# Whether to let other resources handle the loadscreen shutdown.
# true  = another resource (e.g. nt_character) calls the shutdown
# false = screen closes automatically when loading is done
setr loadscreen:externalShutdown true

# ── Style ────────────────────────────────────────────────────────────────────
# Custom styles live in html/styles/
set loadscreen:style "nitelife"
# set loadscreen:style "minimal"
# set loadscreen:style "modern"
# set loadscreen:style "classic"

# ── Background ───────────────────────────────────────────────────────────────
# Option A: solid dark gradient (default — no files needed)
set loadscreen:background "linear-gradient(180deg, #0a0f0a 0%, #0d140d 100%)"
# Option B: image — drop file into html/assets/images/, then uncomment:
# set loadscreen:background "image"
# Option C: video loop — drop .webm into html/assets/videos/, then uncomment:
# set loadscreen:background "video"
# Option D: YouTube embed
# set loadscreen:background "embed"
# set loadscreen:embedLink "https://www.youtube.com/embed?playlist=E49ureeMykI&autoplay=1&loop=1"
# set loadscreen:embedAccess true

# Background brightness (percentage — lower = darker, recommended 15-25 for image/video)
set loadscreen:backgroundBrightness 100
# set loadscreen:backgroundBrightness 20

# ── Colors ───────────────────────────────────────────────────────────────────
# Used for loading bars, audio controls, and shadows
set loadscreen:primaryColor "#22c55e"
set loadscreen:secondaryColor "#374151"
set loadscreen:textColor "#f0fdf4"
set loadscreen:shadowColor "rgba(0, 0, 0, 0.6)"

# ── Font ─────────────────────────────────────────────────────────────────────
# Overridden by nitelife.css (IBM Plex Mono + Syne via Google Fonts)
# set loadscreen:fontFamily "'IBM Plex Mono', monospace"

# ── Branding ─────────────────────────────────────────────────────────────────
# Logo image — place file named logo in html/assets/ (any web image format)
set loadscreen:logo false

# Server message shown during loading (hidden by nitelife.css — NITE/LIFE renders instead)
# Available variables: ${playerName}, ${serverName}
set loadscreen:serverMessage "${playerName}, welcome to ${serverName}!"

# ── Loading Bars ─────────────────────────────────────────────────────────────
# Primary bar = overall % loaded
set loadscreen:primaryBar true
# Secondary bar = current step % (disabled by default)
set loadscreen:secondaryBar false
# Show current loading action label (e.g. INIT_FUNCTION) near secondary bar
set loadscreen:loadingAction false

# ── Finishing State ───────────────────────────────────────────────────────────
set loadscreen:finishingMessage "Finishing up..."
set loadscreen:logLine true
# Only shown when externalShutdown is true:
set loadscreen:finishedMessage "Done!"
set loadscreen:finishedLine "You will be loaded in any moment now..."

# ── Audio ─────────────────────────────────────────────────────────────────────
# Show mute button / volume controls (recommended when music is enabled)
set loadscreen:audioControls true
set loadscreen:audioMuteKey "Space"
set loadscreen:rememberVolume true
set loadscreen:initialAudioVolume 10

# Background music — drop files into html/assets/music/ then set music true
set loadscreen:music false
# set loadscreen:music true
# set loadscreen:musicShuffle false

# ── Images / Video ────────────────────────────────────────────────────────────
set loadscreen:imageRate 7500
set loadscreen:imageShuffle false
set loadscreen:videoShuffle false

# ── Error Log ─────────────────────────────────────────────────────────────────
# Shows an overlay with NUI errors if they occur (recommended during development)
set loadscreen:errorLog true
